name: WP Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration:
    name: "WP Integration (PHP ${{ matrix.php-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2', '8.3', '8.4']
      fail-fast: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mysqli, curl, dom, xml, mbstring
        tools: wp-cli, composer
        coverage: none

    - name: Get Composer Cache Directory
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer Dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Plugin Dependencies
      run: composer install --prefer-dist --no-interaction --no-progress --no-dev

    - name: Install WordPress Core
      run: |
        mkdir -p /tmp/wordpress
        cd /tmp/wordpress
        wp core download --allow-root
        wp config create --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1 --allow-root
        wp core install --url=http://localhost --title="Test Site" --admin_user=admin --admin_password=admin --admin_email=admin@example.com --allow-root

    - name: Symlink Plugin
      run: |
        # Link the current repository to the WordPress plugins directory
        ln -s $GITHUB_WORKSPACE/plugins/authorizenter-core /tmp/wordpress/wp-content/plugins/authorizenter-core
        ln -s $GITHUB_WORKSPACE/plugins/authorizenter-ui /tmp/wordpress/wp-content/plugins/authorizenter-ui

    - name: Activate Plugin
      run: |
        cd /tmp/wordpress
        wp plugin activate authorizenter-core authorizenter-ui --allow-root

    - name: Lifecycle Test - Deactivate & Reactivate
      run: |
        cd /tmp/wordpress
        wp plugin deactivate authorizenter-core authorizenter-ui --allow-root
        wp eval 'echo "Deactivation successful!";' --allow-root
        wp plugin activate authorizenter-core authorizenter-ui --allow-root
        wp eval 'echo "Reactivation successful!";' --allow-root

    - name: Smoke Test - Render Shortcodes
      run: |
        cd /tmp/wordpress
        wp eval '
        $shortcodes = array(
          "[authorizenter_login]",
          "[authorizenter_button]",
          "[authorizenter_url]"
        );
        foreach ($shortcodes as $shortcode) {
          $output = do_shortcode($shortcode);
          if ($output === $shortcode) {
             echo "Failed to render $shortcode\n";
             exit(1);
          }
        }
        echo "Shortcode rendering tests passed!\n";
        ' --allow-root

    - name: Smoke Test - Settings API
      run: |
        cd /tmp/wordpress
        wp eval '
        $option_key = \Authorizenter\Core\Settings::OPTION;
        $test_data = array("client_id" => "test_client_id_123");
        update_option($option_key, $test_data);
        $saved = get_option($option_key);
        if (empty($saved["client_id"]) || $saved["client_id"] !== "test_client_id_123") {
           echo "Failed to save settings.\n";
           exit(1);
        }
        echo "Settings API test passed!\n";
        ' --allow-root

    - name: Smoke Test - Private Site Redirect
      run: |
        cd /tmp/wordpress
        wp eval '
        $option_key = \Authorizenter\Core\Settings::OPTION;
        $test_data = array("private_site" => array("enabled" => true));
        update_option($option_key, $test_data);
        
        $private_site = new \Authorizenter\Core\Private_Site(new \Authorizenter\Core\Settings());
        if (!$private_site->is_enabled()) {
           echo "Failed to enable private site.\n";
           exit(1);
        }
        
        // Simulate an unauthenticated request to a frontend page
        $should_block = $private_site->should_block(false, false, false);
        if (!$should_block) {
           echo "Failed to block unauthenticated request.\n";
           exit(1);
        }
        
        echo "Private Site test passed!\n";
        ' --allow-root

    - name: Smoke Test - REST API Endpoints
      run: |
        cd /tmp/wordpress
        wp eval '
        $request = new WP_REST_Request("GET", "/authorizenter/v1/providers");
        $response = rest_do_request($request);
        
        if ($response->is_error()) {
           echo "REST API returned an error.\n";
           exit(1);
        }
        
        if ($response->get_status() !== 200) {
           echo "REST API returned non-200 status: " . $response->get_status() . "\n";
           exit(1);
        }
        
        echo "REST API test passed!\n";
        ' --allow-root
