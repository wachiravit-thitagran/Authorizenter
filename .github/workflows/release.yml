name: Release

# Build per-plugin ZIPs and attach them to the GitHub Release when a version tag
# is pushed (e.g. v0.2.0). The Autorizenter plugins' self-updater downloads these
# assets (autorizenter-core.zip / autorizenter-ui.zip).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.2'
          coverage: none

      - name: Install runtime dependencies (no dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Bundle vendor into Core plugin
        run: |
          rm -rf plugins/autorizenter-core/vendor
          cp -R vendor plugins/autorizenter-core/vendor

      - name: Build plugin ZIPs
        run: |
          mkdir -p dist
          cd plugins
          zip -rq ../dist/autorizenter-core.zip autorizenter-core \
            -x '*/.git/*' '*/node_modules/*'
          zip -rq ../dist/autorizenter-ui.zip autorizenter-ui \
            -x '*/.git/*' '*/node_modules/*'
          cd ..
          ls -la dist

      - name: Create / update GitHub Release with assets
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/autorizenter-core.zip
            dist/autorizenter-ui.zip
          generate_release_notes: true
